<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أداة دمج البيانات الاحترافية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>دمج وتجميع بيانات الإكسيل</h2>
    <div class="input-group">
        <label>ملف قاعدة البيانات (الأساسي):</label>
        <input type="file" id="mainFile">
    </div>
    <div class="input-group">
        <label>اسم عمود Item Number في الملف الأساسي:</label>
        <input type="text" id="mainColName" placeholder="مثلاً: Item Number">
    </div>
    <hr>
    <div class="input-group">
        <label>ملف البحث:</label>
        <input type="file" id="searchFile">
    </div>
    <div class="input-group">
        <label>اسم عمود Item Number في ملف البحث:</label>
        <input type="text" id="searchColName" placeholder="مثلاً: Item Number">
    </div>
    <button onclick="processData()">معالجة وتجميع البيانات</button>
</div>

<script>
    async function processData() {
        const file1 = document.getElementById('mainFile').files[0];
        const file2 = document.getElementById('searchFile').files[0];
        const col1 = document.getElementById('mainColName').value.trim();
        const col2 = document.getElementById('searchColName').value.trim();

        if (!file1 || !file2 || !col1 || !col2) return alert("يرجى ملء جميع الحقول!");

        const read = (f) => new Promise(res => {
            const reader = new FileReader();
            reader.onload = (e) => res(XLSX.read(e.target.result, {type: 'binary'}));
            reader.readAsBinaryString(f);
        });

        const wb1 = await read(file1);
        const wb2 = await read(file2);
        const data1 = XLSX.utils.sheet_to_json(wb1.Sheets[wb1.SheetNames[0]]);
        const data2 = XLSX.utils.sheet_to_json(wb2.Sheets[wb2.SheetNames[0]]);

        const result = data2.map(row => {
            const matches = data1.filter(m => String(m[col1]).trim() === String(row[col2]).trim());
            
            if (matches.length > 0) {
                // نأخذ نسخة من أول تطابق (ليحتوي على الديسكريبشن وباقي البيانات)
                let mergedRow = { ...row, ...matches[0] };
                
                // نجمع اللوكيشنات والكميات إذا كانت موجودة
                if (matches.length > 1) {
                    mergedRow['Location'] = matches.map(m => m['Location']).join(' | ');
                    mergedRow['Quantity'] = matches.map(m => m['Quantity']).join(' | ');
                }
                return mergedRow;
            } else {
                // إذا لم يوجد تطابق نضع N/A
                return { ...row, 'Description': 'N/A', 'Location': 'N/A', 'Quantity': 'N/A' };
            }
        });

        const ws = XLSX.utils.json_to_sheet(result);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Result");
        XLSX.writeFile(wb, "Final_Result.xlsx");
        alert("تمت العملية بنجاح!");
    }
</script>
</body>
</html>
