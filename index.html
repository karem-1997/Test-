<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل مع المطور</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #333; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .btn {
            background-color: #007bff;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>أهلاً بك!</h1>
        <p>إذا كنت بحاجة إلى مساعدة أو ترغب في تصميم ويب سايت خاص بك، يرجى التواصل مع المطور.</p>
        <a href="https://wa.me/رقمك_هنا" class="btn">تواصل عبر واتساب</a>
    </div>

    <script>
        // رسالة ترحيب عند فتح الصفحة
        window.onload = function() {
            alert("أهلاً بك! إذا كنت بحاجة إلى مساعدة أو ترغب في تصميم ويب سايت خاص بك، يرجى التواصل مع المطور.");
        };
    </script>
</body>
</html>
